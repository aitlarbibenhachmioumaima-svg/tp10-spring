<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace | User Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --user-primary: #3b82f6; /* Bleu clair et moderne */
            --user-bg: #f8fafc;
            --user-card: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--user-bg);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .user-container {
            width: 90%;
            max-width: 600px;
            background: var(--user-card);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .user-avatar {
            width: 80px; height: 80px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--user-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        h2 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 700; color: var(--text-dark); }

        .role-pill {
            display: inline-block;
            padding: 4px 12px;
            background: #dcfce7;
            color: #15803d;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .info-card {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-card i { font-size: 1.5rem; color: var(--user-primary); }
        .info-card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-home { background: #f1f5f9; color: var(--text-dark); }
        .btn-home:hover { background: #e2e8f0; }

        .btn-logout { background: #1e293b; color: white; }
        .btn-logout:hover { background: #0f172a; transform: translateY(-2px); }

    </style>
</head>
<body>

<div class="user-container">
    <div class="user-avatar">
        <i class="fas fa-user"></i>
    </div>

    <span class="role-pill">Accès Utilisateur Standard</span>

    <h2>Espace Utilisateur</h2>

    <div class="info-card">
        <i class="fas fa-info-circle"></i>
        <p>
            Ceci est votre tableau de bord personnel. En tant qu'utilisateur, vous avez accès aux ressources partagées et aux paramètres de votre compte.
        </p>
    </div>

    <div class="action-buttons">
        <a th:href="@{/home}" class="btn btn-home">
            <i class="fas fa-house"></i> Retour à l'accueil
        </a>
        <a th:href="@{/logout}" class="btn btn-logout">
            <i class="fas fa-sign-out-alt"></i> Déconnexion
        </a>
    </div>
</div>

</body>
</html>
